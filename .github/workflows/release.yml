name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  apk:
    name: Build signed APK and attach to GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > /tmp/keystore.jks

      - name: Build signed APK
        env:
          KEYSTORE_FILE: /tmp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             Betabase-${{ steps.version.outputs.version }}-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Betabase-${{ steps.version.outputs.version }}-android.apk

  play-store:
    name: Upload AAB to Play Store
    runs-on: ubuntu-latest
    if: ${{ vars.PLAY_STORE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > /tmp/keystore.jks

      - name: Decode Play Store service-account key
        run: echo "${{ secrets.PLAY_STORE_KEY_JSON }}" | base64 -d > fastlane/play-store-key.json

      - name: Build signed AAB
        env:
          KEYSTORE_FILE: /tmp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Deploy to Play Store
        run: bundle exec fastlane android deploy

  release:
    name: Create GitHub release
    needs: [apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Betabase v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            Betabase-${{ steps.version.outputs.version }}-android.apk
